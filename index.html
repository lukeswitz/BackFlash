<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Flashback Quiz</title>
    <link href="https://typeface.nytimes.com/css/zam5nzz.css" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: #f2f1e8;
        color: #333;
        font-family: "nyt-franklin", arial, helvetica, sans-serif;
      }

      #top-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 200;
        background: #f2f1e8;
        border-bottom: 2px solid #e2e0d6;
      }

      #search-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
      }

      #search-container {
        position: relative;
        flex: 1;
        max-width: 380px;
      }

      #search-input-wrap {
        display: flex;
        align-items: center;
        background: #fff;
        border: 2px solid #e2e0d6;
        border-radius: 25px;
        padding: 0 12px;
        transition: border-color 0.15s;
      }

      #search-input-wrap:focus-within { border-color: #6171c3; }

      #search-icon {
        color: #b1aea5;
        font-size: 15px;
        margin-right: 7px;
        flex-shrink: 0;
      }

      #search-input {
        flex: 1;
        border: none;
        outline: none;
        padding: 8px 0;
        font-size: 14px;
        font-family: "nyt-franklin", arial, helvetica, sans-serif;
        background: transparent;
        color: #333;
        min-width: 0;
      }

      #search-input::placeholder { color: #b1aea5; }

      #search-clear {
        cursor: pointer;
        color: #b1aea5;
        font-size: 18px;
        line-height: 1;
        padding: 0 0 0 6px;
        display: none;
        flex-shrink: 0;
      }

      #search-clear:hover { color: #333; }

      #search-spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #e2e0d6;
        border-top-color: #6171c3;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: none;
        flex-shrink: 0;
        margin-left: 6px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      #search-dropdown {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        width: 100%;
        background: #fff;
        border: 1px solid #e2e0d6;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        max-height: 320px;
        overflow-y: auto;
        display: none;
        z-index: 400;
      }

      .dropdown-section-label {
        padding: 7px 12px 3px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #b1aea5;
      }

      .dropdown-item {
        padding: 9px 12px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .dropdown-item:hover { background: #f2f1e8; }

      .dropdown-item-label {
        font-size: 14px;
        color: #333;
        font-weight: 500;
      }

      .dropdown-item-desc {
        font-size: 11px;
        color: #888;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #btn-random {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #5d72c9;
        color: #fff;
        border: none;
        border-radius: 25px;
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 700;
        font-family: "nyt-franklin", arial, helvetica, sans-serif;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s, transform 0.1s;
        flex-shrink: 0;
      }

      #btn-random:hover { background: #4a5eb0; }
      #btn-random:active { transform: scale(0.97); }
      #btn-random.loading { background: #a0a8d8; pointer-events: none; }

      #btn-random svg {
        width: 13px;
        height: 13px;
        fill: currentColor;
        flex-shrink: 0;
      }

      #btn-random.loading svg { animation: spin 0.7s linear infinite; }

      #game-title {
        font-size: 12px;
        color: #666;
        font-style: italic;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 160px;
        display: none;
      }

      #bank-area {
        position: fixed;
        left: 0;
        width: 100%;
        background: #f2f1e8;
        border-bottom: 2px solid #e2e0d6;
        z-index: 100;
        padding: 8px 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        min-height: 48px;
        transition: background 0.15s;
      }

      #bank-area.drag-over { background: #ece9d4; }

      #bank-empty-hint {
        display: flex;
        align-items: center;
        color: #b1aea5;
        font-size: 13px;
        font-style: italic;
      }

      .bank-card {
        background: #fff;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        cursor: grab;
        user-select: none;
        flex-shrink: 0;
        width: var(--card-w, 130px);
        transition: box-shadow 0.15s;
      }

      .bank-card:active { cursor: grabbing; }
      .bank-card.dragging { opacity: 0.35; }

      .bank-card img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        display: block;
      }

      .bank-card .card-desc {
        padding: 5px 6px;
        font-size: clamp(9px, 1.1vw, 12px);
        font-family: "nyt-imperial", georgia, serif;
        line-height: 1.3;
        user-select: none;
        cursor: grab;
      }

      #page-content {
        padding-bottom: 80px;
      }

      #timeline-wrap {
        max-width: 540px;
        margin: 0 auto;
        padding: 0 12px;
      }

      .tl-label {
        text-align: center;
        color: #999;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 10px 0 4px;
      }

      .tl-drop-zone {
        height: 8px;
        border-radius: 6px;
        transition: height 0.12s, background 0.12s;
      }

      .tl-drop-zone.active {
        height: 68px;
        background: #f4da93;
      }

      .tl-card {
        background: #e3e0d5;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        margin: 3px 0;
        cursor: grab;
        user-select: none;
      }

      .tl-card:active { cursor: grabbing; }
      .tl-card.dragging { opacity: 0.35; }

      .tl-card img {
        width: 68px;
        height: 51px;
        object-fit: cover;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .tl-card .card-desc {
        flex: 1;
        font-size: 13px;
        font-family: "nyt-imperial", georgia, serif;
        line-height: 1.3;
        min-width: 0;
        user-select: none;
        cursor: grab;
      }

      .year-badge {
        background: #b1aea5;
        color: #fff;
        border-radius: 8px;
        padding: 3px 8px;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
        font-family: "nyt-franklin", arial, sans-serif;
      }

      .tl-card.correct .year-badge { background: #5cb887; }
      .tl-card.incorrect .year-badge { background: #d25353; }

      #submit-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(242, 241, 232, 0.97);
        border-top: 2px solid #e2e0d6;
        padding: 10px 20px;
        text-align: center;
        z-index: 200;
        display: none;
        gap: 10px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
      }

      #results-text {
        font-size: 14px;
        color: #444;
        font-family: "nyt-franklin", arial, sans-serif;
      }

      #btn-submit {
        background: #5d72c9;
        color: #fff;
        border: none;
        border-radius: 25px;
        padding: 9px 32px;
        font-size: 14px;
        font-weight: 700;
        font-family: "nyt-franklin", arial, helvetica, sans-serif;
        cursor: pointer;
        transition: background 0.15s;
      }

      #btn-submit:hover { background: #4a5eb0; }

      #btn-restart {
        background: transparent;
        border: 2px solid #5d72c9;
        color: #5d72c9;
        border-radius: 25px;
        padding: 7px 24px;
        font-size: 14px;
        font-weight: 700;
        font-family: "nyt-franklin", arial, helvetica, sans-serif;
        cursor: pointer;
        display: none;
        transition: background 0.15s, color 0.15s;
      }

      #btn-restart:hover { background: #5d72c9; color: #fff; }

      #message {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 300;
        color: #616161;
        font-style: italic;
        background: rgba(255, 255, 255, 0.97);
        padding: 10px 20px;
        border-radius: 15px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        display: none;
        white-space: nowrap;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="top-bar">
      <div id="search-row">
        <div id="search-container">
          <div id="search-input-wrap">
            <span id="search-icon">&#9906;</span>
            <input
              id="search-input"
              type="text"
              placeholder="Search any topic..."
              autocomplete="off"
            />
            <span id="search-clear" title="Clear">&times;</span>
            <div id="search-spinner"></div>
          </div>
          <div id="search-dropdown"></div>
        </div>

        <button id="btn-random">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M17 4l4 4-4 4V9h-3.08A8 8 0 0 1 20 19l-1.42 1.42A6 6 0 0 0 6.68 9H9V7H3v6h2v-2.1A8 8 0 0 1 13.92 9H17V4zm-7.42 11.58A6 6 0 0 0 18.32 11H16V9h6v6h-2v-2.1a8 8 0 0 1-6.08 8.52L12.5 23 9 19l4-4-.42 3.58z"
            />
          </svg>
          Random
        </button>

        <span id="game-title"></span>
      </div>
    </div>

    <div id="bank-area"></div>

    <div id="page-content">
      <div id="timeline-wrap">
        <div id="timeline"></div>
      </div>
    </div>

    <div id="submit-bar">
      <span id="results-text"></span>
      <button id="btn-submit">Submit</button>
      <button id="btn-restart">Play Again</button>
    </div>

    <div id="message"></div>

    <script>
      const SPARQL_ENDPOINT = "https://query.wikidata.org/sparql";
      const WIKIDATA_API = "https://www.wikidata.org/w/api.php";
      const UA = "FlashbackQuiz/1.0 (https://localhost)";

      async function sparqlFetch(sparql) {
        const url =
          `${SPARQL_ENDPOINT}?query=${encodeURIComponent(sparql)}` +
          `&format=json&useragent=${encodeURIComponent(UA)}`;
        const res = await fetch(url, {
          headers: { Accept: "application/sparql-results+json" },
        });
        if (!res.ok) throw new Error(`SPARQL ${res.status}`);
        return res.json();
      }

      const SEEDS = [
        { value: "Q11424",   label: "Films" },
        { value: "Q482994",  label: "Music Albums" },
        { value: "Q3305213", label: "Paintings" },
        { value: "Q12280",   label: "Bridges" },
        { value: "Q839954",  label: "Archaeological Sites" },
        { value: "Q207694",  label: "Art Museums" },
        { value: "Q1248784", label: "Airports" },
        { value: "Q5398426", label: "Television Series" },
        { value: "Q2221906", label: "Geographic Locations" },
        { value: "Q4830453", label: "Businesses" },
        { value: "Q1344",    label: "Operas" },
        { value: "Q1093829", label: "U.S. Cities" },
        { value: "Q39715",   label: "Lighthouses" },
        { value: "Q16917",   label: "Hospitals" },
        { value: "Q23413",   label: "Castles" },
        { value: "Q44613",   label: "Monasteries" },
        { value: "Q33506",   label: "Museums" },
        { value: "Q3947",    label: "Houses" },
        { value: "Q571",     label: "Books" },
        { value: "Q11707",   label: "Restaurants" },
        { value: "Q179700",  label: "Statues" },
        { value: "Q178561",  label: "Battles" },
        { value: "Q198",     label: "Wars" },
        { value: "Q57821",   label: "Fortifications" },
        { value: "Q2977",    label: "Cathedrals" },
        { value: "Q42948",   label: "Walls" },
        { value: "Q16560",   label: "Palaces" },
        { value: "Q7725634", label: "Literary Works" },
        { value: "Q8261",    label: "Novels" },
        { value: "Q44782",   label: "Ports" },
        { value: "Q55488",   label: "Railway Stations" },
        { value: "Q49084",   label: "Short Stories" },
        { value: "Q1076486", label: "Sports Venues" },
        { value: "Q46169",   label: "National Parks" },
        { value: "Q182832",  label: "Concerts" },
        { value: "Q1329623", label: "Cultural Centers" },
        { value: "Q2031836", label: "Orthodox Churches" },
        { value: "Q692",     label: "Shakespeare's Works",    prop: "P50" },
        { value: "Q23434",   label: "Hemingway's Works",      prop: "P50" },
        { value: "Q5686",    label: "Dickens's Works",        prop: "P50" },
        { value: "Q40909",   label: "Virginia Woolf's Works", prop: "P50" },
        { value: "Q991",     label: "Dostoyevsky's Works",    prop: "P50" },
        { value: "Q7243",    label: "Tolstoy's Works",        prop: "P50" },
      ];

      async function discoverAndEnqueue() {
        const deck = getDeck();
        const spent = getSpent();
        const used = new Set([...deck, ...spent].map((g) => g.value));
        const remaining = SEEDS.filter((s) => !used.has(s.value));
        const pool = remaining.length ? remaining : SEEDS;
        const pick = pool[Math.floor(Math.random() * pool.length)];
        try {
          await fetchGameEvents(pick.value, pick.prop ?? null);
          addToDeck(pick);
          return pick;
        } catch {
          return null;
        }
      }

      async function nextTopic() {
        const fromDeck = popFromDeck();
        if (fromDeck) {
          discoverAndEnqueue().catch(() => {});
          return fromDeck;
        }
        for (let i = 0; i < SEEDS.length; i++) {
          const game = await discoverAndEnqueue();
          if (game) {
            popFromDeck();
            return game;
          }
        }
        throw new Error("Could not find a playable topic");
      }

      const KEY_HISTORY = "fbq_history";
      const KEY_GAME    = "fbq_game";
      const KEY_DECK    = "fbq_deck";
      const KEY_SPENT   = "fbq_spent";

      const state = {
        game: null,
        events: [],
        bank: [],
        timeline: [],
        submitted: false,
        dragging: null,
        dragOverZone: null,
        history: [],
        searchResults: [],
        searchOpen: false,
      };

      function safeGet(key) {
        try {
          const r = localStorage.getItem(key);
          return r ? JSON.parse(r) : null;
        } catch {
          return null;
        }
      }

      function safeSet(key, val) {
        try {
          localStorage.setItem(key, JSON.stringify(val));
        } catch {}
      }

      function loadHistory() {
        return safeGet(KEY_HISTORY) ?? [];
      }

      function pushHistory(game) {
        const h = loadHistory().filter((g) => g.value !== game.value);
        safeSet(KEY_HISTORY, [game, ...h].slice(0, 20));
      }

      function getDeck() {
        return safeGet(KEY_DECK) ?? [];
      }

      function getSpent() {
        return safeGet(KEY_SPENT) ?? [];
      }

      function popFromDeck() {
        let deck = getDeck();
        const spent = getSpent();
        if (!deck.length && spent.length) {
          deck = shuffle(spent);
          safeSet(KEY_SPENT, []);
          safeSet(KEY_DECK, deck);
        }
        if (!deck.length) return null;
        const item = deck.shift();
        safeSet(KEY_DECK, deck);
        return item;
      }

      function addToDeck(game) {
        const deck = getDeck();
        const spent = getSpent();
        if ([...deck, ...spent].some((g) => g.value === game.value)) return;
        safeSet(KEY_DECK, [...deck, game]);
      }

      function markSpent(game) {
        safeSet(KEY_DECK, getDeck().filter((g) => g.value !== game.value));
        const spent = getSpent();
        if (!spent.some((g) => g.value === game.value)) {
          safeSet(KEY_SPENT, [...spent, game]);
        }
      }

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function parseYear(iso) {
        if (!iso) return null;
        if (iso.startsWith("-")) return -parseInt(iso.slice(1, 5), 10);
        return parseInt(iso.slice(0, 4), 10);
      }

      function toDisplayYear(y) {
        return y < 0 ? `${Math.abs(y)} BC` : String(y);
      }

      function fixImageUrl(url) {
        return url.replace("http://", "https://") + "?width=160";
      }

      function setMessage(msg) {
        const el = document.getElementById("message");
        el.textContent = msg;
        el.style.display = msg ? "block" : "none";
      }

      function getCardWidth() {
        const available = Math.min(window.innerWidth, 540) - 24;
        const count = Math.min(state.events.length || 8, 8);
        const gaps = (count - 1) * 6;
        return Math.max(90, Math.min(148, (available - gaps) / count));
      }

      function adjustLayout() {
        const topBar  = document.getElementById("top-bar");
        const bankArea = document.getElementById("bank-area");
        const content  = document.getElementById("page-content");
        const topH  = topBar.getBoundingClientRect().height;
        const bankH = bankArea.getBoundingClientRect().height;
        bankArea.style.top = `${topH}px`;
        content.style.paddingTop = `${topH + bankH + 10}px`;
      }

      async function searchEntities(query) {
        const p = new URLSearchParams({
          action: "wbsearchentities",
          search: query,
          language: "en",
          limit: "10",
          format: "json",
          origin: "*",
          type: "item",
        });
        const res = await fetch(`${WIKIDATA_API}?${p}`);
        if (!res.ok) throw new Error(`${res.status}`);
        const json = await res.json();
        return (json.search ?? []).map((r) => ({
          id: r.id,
          label: r.label ?? r.id,
          description: r.description ?? "",
        }));
      }

      async function validateEntityIds(ids) {
        if (!ids.length) return new Set();
        const values = ids.map((id) => `wd:${id}`).join(" ");
        const sparql = `
SELECT ?entity WHERE {
  VALUES ?entity { ${values} }
  ?item wdt:P31/wdt:P279* ?entity;
        wdt:P18 ?image.
  {?item wdt:P571 ?date.} UNION
  {?item wdt:P577 ?date.} UNION
  {?item wdt:P580 ?date.} UNION
  {?item wdt:P569 ?date.}
  FILTER(YEAR(?date) > 0)
}
GROUP BY ?entity
HAVING (COUNT(DISTINCT ?item) >= 2)
`;
        try {
          const json = await sparqlFetch(sparql);
          return new Set(
            json.results.bindings.map((b) => b.entity.value.split("/").pop())
          );
        } catch {
          return new Set(ids);
        }
      }

      function buildSparql(entityId, prop) {
        if (prop) {
          return `
SELECT DISTINCT ?item ?itemLabel ?itemDescription ?date ?image WHERE {
  ?item wdt:${prop} wd:${entityId};
        wdt:P18 ?image.
  {?item wdt:P571 ?date.} UNION
  {?item wdt:P577 ?date.} UNION
  {?item wdt:P580 ?date.} UNION
  {?item wdt:P569 ?date.}
  FILTER(YEAR(?date) > 0)
  SERVICE wikibase:label {
    bd:serviceParam wikibase:language "en".
  }
}
LIMIT 60
`;
        }
        return `
SELECT DISTINCT ?item ?itemLabel ?itemDescription ?date ?image WHERE {
  ?item wdt:P31/wdt:P279* wd:${entityId};
        wdt:P18 ?image.
  {?item wdt:P571 ?date.} UNION
  {?item wdt:P577 ?date.} UNION
  {?item wdt:P580 ?date.} UNION
  {?item wdt:P569 ?date.}
  FILTER(YEAR(?date) > 0)
  SERVICE wikibase:label {
    bd:serviceParam wikibase:language "en".
  }
}
LIMIT 60
`;
      }
      
      function cleanLabel(s) {
        return s
        .replace(/^\d{4}\s+/, "")
        .replace(/\s+of\s+\d{4}([–\-]\d{2,4})?/gi, "")
        .replace(/\s+\d{4}[–\-]\d{2,4}/g, "")
        .replace(/\s*\(\d{4}([–\-]\d{2,4})?\)/g, "")
        .trim();
      }
      
      function cleanDesc(s) {
        return s
        .replace(/\bfrom\s+\d{4}\s+to\s+\d{4}\b/gi, "")
        .replace(/\b\d{4}[–\-]\d{2,4}\b/g, "")
        .replace(/\b(1[0-9]{3}|20[0-9]{2})\b/g, "")
        .replace(/\s{2,}/g, " ")
        .replace(/\s+([,.])/g, "$1")
        .replace(/^[–\-,\s]+/, "")
        .trim();
      }

      async function fetchGameEvents(entityId, prop = null) {
        const sparql = buildSparql(entityId, prop);
        const json = await sparqlFetch(sparql);
        const bindings = json.results.bindings;
        if (!bindings.length) throw new Error("No results for that topic");
        
        const seen = new Set();
        const deduped = [];
        for (const b of bindings) {
          const id = b.item?.value;
          if (!id || !b.date?.value || !b.itemLabel?.value || !b.image?.value)
            continue;
          const year = parseYear(b.date.value);
          if (year === null) continue;
          if (seen.has(id)) continue;
          seen.add(id);
          deduped.push({ ...b, _year: year });
        }
        
        if (deduped.length < 2)
          throw new Error("Not enough dated items with images");
        
        const selected = shuffle(deduped).slice(0, 8);
        selected.sort((a, b) => a._year - b._year);
        
        return selected.map((b, i) => {
          const year  = b._year;
          const label = cleanLabel(b.itemLabel.value);
          const desc  = cleanDesc(b.itemDescription?.value ?? "");
          return {
            id: i + 1,
            year,
            displayYear: toDisplayYear(year),
            description: desc
            ? `<b>${label}</b> — ${desc}`
            : `<b>${label}</b>`,
            image: fixImageUrl(b.image.value),
          };
        });
      }
      
      async function resolveToPlayableClass(qid) {
        const sparql = `
SELECT ?class ?classLabel WHERE {
  wd:${qid} wdt:P31 ?class.
  SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
}
LIMIT 10
`;
        try {
          const json = await sparqlFetch(sparql);
          const candidates = json.results.bindings.map((b) => ({
            value: b.class.value.split("/").pop(),
            label: b.classLabel?.value ?? b.class.value.split("/").pop(),
          }));
          if (!candidates.length) return null;
          const validIds = await validateEntityIds(candidates.map((c) => c.value));
          return candidates.find((c) => validIds.has(c.value)) ?? null;
        } catch {
          return null;
        }
      }

      async function loadGame(game) {
        state.game = game;
        state.submitted = false;
        state.dragging = null;
        state.dragOverZone = null;
        state.events = [];
        state.bank = [];
        state.timeline = [];

        safeSet(KEY_GAME, game);
        pushHistory(game);
        state.history = loadHistory();

        const titleEl = document.getElementById("game-title");
        titleEl.textContent = game.label;
        titleEl.style.display = "block";

        setMessage(`Loading ${game.label}...`);
        render();

        try {
          const events = await fetchGameEvents(game.value, game.prop ?? null);
          state.events = events;
          state.bank = shuffle([...events]);
          state.timeline = [];
          setMessage("");
        } catch (err) {
          setMessage(`Failed: ${err.message}. Try another topic.`);
        }
        render();
      }

      function getCorrectOrder() {
        return [...state.events].sort((a, b) => a.year - b.year);
      }

      function getCardStatus(event, index) {
        return event.id === getCorrectOrder()[index]?.id ? "correct" : "incorrect";
      }

      function getScore() {
        const correct = getCorrectOrder();
        let score = 0;
        for (let i = 0; i < state.timeline.length; i++) {
          if (state.timeline[i].id === correct[i]?.id) score++;
        }
        return { score, total: state.events.length };
      }

      function renderBank() {
        const el = document.getElementById("bank-area");
        const w  = getCardWidth();
        document.documentElement.style.setProperty("--card-w", `${w}px`);

        if (!state.events.length || state.submitted) {
          el.innerHTML = "";
          return;
        }

        if (!state.bank.length) {
          el.innerHTML =
            '<span id="bank-empty-hint">All placed — submit when ready</span>';
          return;
        }

        el.innerHTML = state.bank
          .map(
            (ev) => `
          <div class="bank-card" draggable="true" data-id="${ev.id}">
            <img src="${ev.image}" alt="" onerror="this.style.display='none'" />
            <div class="card-desc">${ev.description}</div>
          </div>
        `
          )
          .join("");

        el.querySelectorAll(".bank-card").forEach((card) => {
          const id = parseInt(card.dataset.id, 10);
          card.addEventListener("dragstart", (e) => {
            state.dragging = { id, from: "bank" };
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/plain", String(id));
            setTimeout(() => card.classList.add("dragging"), 0);
          });
          card.addEventListener("dragend", () => {
            card.classList.remove("dragging");
            if (state.dragging) {
              state.dragging = null;
              state.dragOverZone = null;
              renderTimeline();
            }
          });
        });
      }

      function renderTimeline() {
        const el = document.getElementById("timeline");
        if (!state.events.length) {
          el.innerHTML = "";
          return;
        }

        const { timeline, dragOverZone, submitted } = state;

        let html = `<div class="tl-label">EARLIEST</div>`;

        if (!submitted) {
          html += dropZoneHtml(0, dragOverZone);
        }

        for (let i = 0; i < timeline.length; i++) {
          const ev     = timeline[i];
          const status = submitted ? getCardStatus(ev, i) : "";
          html += `
            <div class="tl-card ${status}"
              draggable="${!submitted}"
              data-id="${ev.id}">
              <img src="${ev.image}" alt=""
                onerror="this.style.display='none'" />
              <div class="card-desc">${ev.description}</div>
              ${submitted
                ? `<div class="year-badge">${ev.displayYear}</div>`
                : ""}
            </div>
          `;
          if (!submitted) {
            html += dropZoneHtml(i + 1, dragOverZone);
          }
        }

        html += `<div class="tl-label">LATEST</div>`;
        el.innerHTML = html;

        if (!submitted) {
          el.querySelectorAll(".tl-card").forEach((card) => {
            const id = parseInt(card.dataset.id, 10);
            card.addEventListener("dragstart", (e) => {
              state.dragging = { id, from: "timeline" };
              e.dataTransfer.effectAllowed = "move";
              e.dataTransfer.setData("text/plain", String(id));
              setTimeout(() => card.classList.add("dragging"), 0);
            });
            card.addEventListener("dragend", () => {
              card.classList.remove("dragging");
              if (state.dragging) {
                state.dragging = null;
                state.dragOverZone = null;
                renderTimeline();
              }
            });
          });

          el.querySelectorAll(".tl-drop-zone").forEach((zone) => {
            const z = parseInt(zone.dataset.zone, 10);

            zone.addEventListener("dragenter", (e) => {
              e.preventDefault();
              state.dragOverZone = z;
              el.querySelectorAll(".tl-drop-zone").forEach((dz) =>
                dz.classList.remove("active")
              );
              zone.classList.add("active");
            });

            zone.addEventListener("dragover", (e) => {
              e.preventDefault();
              e.dataTransfer.dropEffect = "move";
            });

            zone.addEventListener("dragleave", (e) => {
              if (!zone.contains(e.relatedTarget)) {
                zone.classList.remove("active");
                if (state.dragOverZone === z) state.dragOverZone = null;
              }
            });

            zone.addEventListener("drop", (e) => {
              e.preventDefault();
              state.dragOverZone = null;
              if (!state.dragging) return;
              const { id, from } = state.dragging;
              let ev;

              if (from === "bank") {
                ev = state.bank.find((b) => b.id === id);
                if (!ev) return;
                state.bank = state.bank.filter((b) => b.id !== id);
              } else {
                ev = state.timeline.find((t) => t.id === id);
                if (!ev) return;
                state.timeline = state.timeline.filter((t) => t.id !== id);
              }

              const insertAt = Math.max(0, Math.min(z, state.timeline.length));
              state.timeline.splice(insertAt, 0, ev);
              state.dragging = null;
              render();
            });
          });
        }
      }

      function dropZoneHtml(index, activeZone) {
        const active = activeZone === index && state.dragging !== null;
        return `<div class="tl-drop-zone${active ? " active" : ""}"
          data-zone="${index}"></div>`;
      }

      function renderSubmitBar() {
        const bar         = document.getElementById("submit-bar");
        const btnSubmit   = document.getElementById("btn-submit");
        const btnRestart  = document.getElementById("btn-restart");
        const resultsText = document.getElementById("results-text");

        if (!state.events.length) {
          bar.style.display = "none";
          return;
        }

        bar.style.display = "flex";

        if (state.submitted) {
          const { score, total } = getScore();
          resultsText.textContent = `${score} of ${total} in the correct position`;
          btnSubmit.style.display = "none";
          btnRestart.style.display = "inline-block";
          return;
        }

        resultsText.textContent = "";
        btnRestart.style.display = "none";

        if (state.bank.length === 0 && state.timeline.length > 0) {
          btnSubmit.style.display = "inline-block";
        } else {
          bar.style.display = "none";
        }
      }

      function render() {
        renderBank();
        renderTimeline();
        renderSubmitBar();
        requestAnimationFrame(adjustLayout);
      }

      let debounceTimer = null;

      function renderDropdown() {
        const dropdown = document.getElementById("search-dropdown");
        const query    = document.getElementById("search-input").value.trim();
        const history  = state.history;
        const results  = state.searchResults;

        if (!state.searchOpen || (!query && !history.length)) {
          dropdown.style.display = "none";
          return;
        }

        let html = "";

        if (!query && history.length) {
          html += `<div class="dropdown-section-label">Recent</div>`;
          for (const g of history) {
            html += `
              <div class="dropdown-item"
                data-id="${g.value}"
                data-label="${escapeAttr(g.label)}">
                <span class="dropdown-item-label">
                  ${escapeHtml(g.label)}
                </span>
              </div>
            `;
          }
        }

        if (query && results.length) {
          html += `<div class="dropdown-section-label">Results</div>`;
          for (const r of results) {
            html += `
              <div class="dropdown-item"
                data-id="${r.id}"
                data-label="${escapeAttr(r.label)}">
                <span class="dropdown-item-label">
                  ${escapeHtml(r.label)}
                </span>
                ${r.description
                  ? `<span class="dropdown-item-desc">
                      ${escapeHtml(r.description)}
                     </span>`
                  : ""}
              </div>
            `;
          }
        }

        if (!html) {
          dropdown.style.display = "none";
          return;
        }

        dropdown.innerHTML = html;
        dropdown.style.display = "block";

        dropdown.querySelectorAll(".dropdown-item").forEach((item) => {
          item.addEventListener("mousedown", (e) => {
            e.preventDefault();
            const id    = item.dataset.id;
            const label = item.dataset.label;
            document.getElementById("search-input").value = "";
            document.getElementById("search-clear").style.display = "none";
            state.searchResults = [];
            state.searchOpen = false;
            dropdown.style.display = "none";
            loadGame({ label, value: id });
          });
        });
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function escapeAttr(s) {
        return s.replace(/"/g, "&quot;");
      }

      function initSearch() {
        const input      = document.getElementById("search-input");
        const spinner    = document.getElementById("search-spinner");
        const clearBtn   = document.getElementById("search-clear");
        const btnRandom  = document.getElementById("btn-random");
        const btnSubmit  = document.getElementById("btn-submit");
        const btnRestart = document.getElementById("btn-restart");
        const bankArea   = document.getElementById("bank-area");

        state.history = loadHistory();

        bankArea.addEventListener("dragover", (e) => {
          if (state.dragging?.from === "timeline") {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            bankArea.classList.add("drag-over");
          }
        });

        bankArea.addEventListener("dragleave", (e) => {
          if (!bankArea.contains(e.relatedTarget)) {
            bankArea.classList.remove("drag-over");
          }
        });

        bankArea.addEventListener("drop", (e) => {
          e.preventDefault();
          bankArea.classList.remove("drag-over");
          if (state.dragging?.from !== "timeline") return;
          const id = state.dragging.id;
          const ev = state.timeline.find((t) => t.id === id);
          if (!ev) return;
          state.timeline = state.timeline.filter((t) => t.id !== id);
          state.bank = [...state.bank, ev];
          state.dragging = null;
          render();
        });

        input.addEventListener("focus", () => {
          state.searchOpen = true;
          renderDropdown();
        });

        input.addEventListener("blur", () => {
          setTimeout(() => {
            state.searchOpen = false;
            document.getElementById("search-dropdown").style.display = "none";
          }, 150);
        });

        input.addEventListener("input", () => {
          const q = input.value;
          clearBtn.style.display = q ? "block" : "none";
          state.searchResults = [];
          if (debounceTimer) clearTimeout(debounceTimer);
          if (!q.trim()) {
            spinner.style.display = "none";
            renderDropdown();
            return;
          }
          spinner.style.display = "block";
          debounceTimer = setTimeout(async () => {
            try {
              const raw = await searchEntities(q);
              if (raw.length) {
                const validIds = await validateEntityIds(raw.map((r) => r.id));
                state.searchResults = raw.filter((r) => validIds.has(r.id));
              } else {
                state.searchResults = [];
              }
            } catch {
              state.searchResults = [];
            }
            spinner.style.display = "none";
            renderDropdown();
          }, 300);
        });

        clearBtn.addEventListener("click", () => {
          input.value = "";
          clearBtn.style.display = "none";
          state.searchResults = [];
          state.searchOpen = true;
          renderDropdown();
          input.focus();
        });

        document.addEventListener("click", (e) => {
          const container = document.getElementById("search-container");
          if (!container.contains(e.target)) {
            state.searchOpen = false;
            document.getElementById("search-dropdown").style.display = "none";
          }
        });

        btnRandom.addEventListener("click", async () => {
          btnRandom.classList.add("loading");
          try {
            const game = await nextTopic();
            markSpent(game);
            await loadGame(game);
          } catch (err) {
            setMessage(`Random failed: ${err.message}`);
          } finally {
            btnRandom.classList.remove("loading");
          }
        });

        btnSubmit.addEventListener("click", () => {
          if (state.bank.length > 0) return;
          state.submitted = true;
          render();
        });

        btnRestart.addEventListener("click", () => {
          state.bank = shuffle([...state.events]);
          state.timeline = [];
          state.submitted = false;
          state.dragging = null;
          state.dragOverZone = null;
          render();
        });

        window.addEventListener("resize", () => {
          renderBank();
          requestAnimationFrame(adjustLayout);
        });

        const savedGame = safeGet(KEY_GAME);
        if (savedGame) loadGame(savedGame);
      }

      initSearch();
    </script>
  </body>
</html>
